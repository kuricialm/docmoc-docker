name: docmoc

services:
  docmoc:
    container_name: docmoc
    image: ${DOCMOC_IMAGE:-egsa/docmoc:latest}
    pull_policy: always
    ports:
      - "3000:3001"
    volumes:
      - ./data:/app/data
    environment:
      - ADMIN_EMAIL=admin@docmoc.local
      - ADMIN_PASSWORD=admin
      - TRASH_RETENTION_DAYS=30
      - COOKIE_SECRET=change-me-in-production
      - AI_SECRETS_MASTER_KEY=change-me-for-ai-secrets
      - MAX_CONCURRENT_SUMMARIES_PER_USER=2
    restart: unless-stopped
